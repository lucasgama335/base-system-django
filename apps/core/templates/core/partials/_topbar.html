<section class="flex justify-between items-center w-full h-[78px] bg-white p-5 mb-4 rounded-lg">
    <button id="mainMenuControl">
        <i class="fa-solid fa-bars"></i>
    </button>

    <!-- Container do Dropdown -->
    <div class="relative inline-block text-left">
        
        <!-- Botão que aciona o Dropdown -->
        <button id="dropdown-btn" type="button" class="inline-flex justify-center items-center w-full rounded-md px-4 py-2 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none transition-colors" aria-haspopup="true" aria-expanded="false">
            <div class="flex items-center gap-2">
                <img src="https://templates.iqonic.design/xray-dist/html/assets/images/user/001.png" class="h-[50px] w-[50px]">
                <div class="flex flex-col items-start">
                    <span class="text-[13px] font-medium">{{ user.first_name }} {{ user.last_name }}</span>
                    <span class="text-[12px] font-normal text-cyan-600">Otorrinolaringologista</span>
                </div>
            </div>
            <!-- Ícone de seta -->
            <svg class="-mr-1 ml-2 h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
        </button>

        <!-- Menu do Dropdown -->
        <!-- Começa oculto (hidden) e com classes de animação (opacity-0 scale-95) -->
        <div id="dropdown-menu" class="hidden absolute right-0 mt-2 w-56 origin-top-right rounded-md bg-white shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none z-10 transition-all duration-200 ease-out opacity-0 transform scale-95" role="menu" aria-orientation="vertical" aria-labelledby="dropdown-btn">
            
            <div class="py-1" role="none">
                <a href="{% url "accounts:profile" %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900" role="menuitem">Configurações</a>
                
                <hr class="my-1 border-gray-200">
                
                <form method="POST" action="{% url "accounts:logout" %}" role="none">
                    {% csrf_token %}
                    <button type="submit" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 hover:text-red-700" role="menuitem">Sair da conta</button>
                </form>
            </div>
            
        </div>
    </div>
</section>
